    /* ── Status line ── */

<script>
(function () {
  'use strict';

  /* ── Matrix rain ── */
  (function rainInit() {
    var canvas = document.getElementById('rain');
    var ctx = canvas.getContext('2d');
    var cols, drops;
    var chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF';

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      cols = Math.floor(canvas.width / 16);
      drops = Array.from({ length: cols }, function () {
        return Math.random() * -canvas.height / 16 | 0;
      });
    }

    function draw() {
      ctx.fillStyle = 'rgba(0,0,0,0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00ff41';
      ctx.font = '14px Courier New, monospace';
      for (var i = 0; i < cols; i++) {
        var ch = chars[Math.random() * chars.length | 0];
        ctx.fillText(ch, i * 16, drops[i] * 16);
        if (drops[i] * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }

    resize();
    window.addEventListener('resize', resize);

    /* RAF with ~50 ms throttle — pauses automatically when tab is hidden */
    var lastRainDraw = 0;
    function rainLoop(ts) {
      requestAnimationFrame(rainLoop);
      if (ts - lastRainDraw < 50) return;
      lastRainDraw = ts;
      draw();
    }
    requestAnimationFrame(rainLoop);
  })();

  /* ── Audio + Visualizer ── */
  var audio    = document.getElementById('audio');
  var playBtn  = document.getElementById('playBtn');
  var stopBtn  = document.getElementById('stopBtn');
  var seek     = document.getElementById('seek');
  var volSlider = document.getElementById('vol');
  var elapsed  = document.getElementById('elapsed');
  var duration = document.getElementById('duration');
  var status   = document.getElementById('status');
  var vizCanvas = document.getElementById('viz');
  var vctx     = vizCanvas.getContext('2d');

  /* Logical (CSS) pixel dimensions used for all drawing */
  var vizW = 0, vizH = 0;

  /* ── Playlist ── */
  var playlist = [
    {
      title: 'Junglebrain',
      artist: 'mAcRoS',
      src: 'https://raw.githubusercontent.com/ajardan/deb_jungle/refs/heads/master/mAcRoS-Junglebrain.mp3'
    },
    {
      title: 'Hoofbeast Tribute Mix',
      artist: 'mAcRoS',
      src: 'https://raw.githubusercontent.com/ajardan/deb_jungle/refs/heads/master/hoofbeats.mp3'
    }
  ];
  var currentTrackIndex = 0;

  var audioCtx, source, analyser, gainNode, dataArr;
  var vizRAF;
  var playing = false;
  var muted = false;
  var gainConnected = false;

  function fmt(s) {
    if (!isFinite(s)) return '--:--';
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function setStatus(msg) {
    status.innerHTML = msg + '<span class="cursor"></span>';
  }

  function updateSeekFill() {
    var pct = parseFloat(seek.value) || 0;
    seek.style.setProperty('--fill', pct.toFixed(2) + '%');
  }

  function updateVolFill() {
    var pct = (parseFloat(volSlider.value) || 0) * 100;
    volSlider.style.setProperty('--fill', pct.toFixed(1) + '%');
  }

  function checkMarquee() {
    var el = document.getElementById('trackName');
    var wrap = el.parentElement;
    /* Allow one frame for layout to settle before measuring */
    setTimeout(function () {
      if (el.scrollWidth > wrap.clientWidth + 4) {
        var dist = el.scrollWidth - wrap.clientWidth;
        el.style.setProperty('--marquee-dist', '-' + dist + 'px');
        el.classList.add('marquee');
      } else {
        el.classList.remove('marquee');
        el.style.removeProperty('--marquee-dist');
      }
    }, 60);
  }

  function renderPlaylist() {
    var list = document.getElementById('playlistList');
    list.innerHTML = '';
    playlist.forEach(function (track, i) {
      var item = document.createElement('div');
      item.className = 'playlist-item' + (i === currentTrackIndex ? ' active' : '');
      item.setAttribute('role', 'listitem');
      item.setAttribute('tabindex', '0');
      item.innerHTML =
        '<span class="pl-num">' + (i + 1) + '</span>' +
        '<span class="pl-artist">' + track.artist + '</span>' +
        '&nbsp;&mdash;&nbsp;' + track.title;
      item.addEventListener('click', function () { playTrack(i); });
      item.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); playTrack(i); }
      });
      list.appendChild(item);
    });
  }

  function setTrackNameUI(track) {
    document.getElementById('trackName').innerHTML =
      '<span style="opacity:0.6;font-size:0.85em">' + track.artist + '</span>' +
      '&nbsp;&mdash;&nbsp;' + track.title + '<span class="cursor"></span>';
    checkMarquee();
  }

  function loadTrack(index) {
    currentTrackIndex = index;
    var track = playlist[index];
    audio.pause();
    playing = false;
    playBtn.innerHTML = '&#9654; PLAY';
    playBtn.classList.remove('active');
    seek.value = 0;
    updateSeekFill();
    elapsed.textContent = '00:00';
    duration.textContent = '--:--';
    audio.src = track.src;
    audio.load();
    setTrackNameUI(track);
    renderPlaylist();
    setStatus('LOADING — ' + track.artist.toUpperCase() + ' — ' + track.title.toUpperCase());
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'none';
  }

  function playTrack(index) {
    loadTrack(index);
    setTimeout(function () { playBtn.click(); }, 50);
  }

  function prevTrack() {
    var wasPlaying = playing;
    loadTrack((currentTrackIndex - 1 + playlist.length) % playlist.length);
    if (wasPlaying) setTimeout(function () { playBtn.click(); }, 50);
  }

  function nextTrack() {
    var wasPlaying = playing;
    loadTrack((currentTrackIndex + 1) % playlist.length);
    if (wasPlaying) setTimeout(function () { playBtn.click(); }, 50);
  }

  function isIOS() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  }

  function initAudioCtx() {
    if (audioCtx) return;
    /* On iOS, createMediaElementSource permanently routes audio through the
       Web Audio graph. iOS suspends AudioContext in background, silencing it.
       Skip Web Audio API on iOS so the <audio> element plays natively and
       continues in background. Volume and mute fall back to audio.volume/muted. */
    if (isIOS()) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    /* iOS suspends AudioContext when switching apps.
       Pause the audio element so time doesn't drift silently;
       auto-resume both when the AudioContext comes back. */
    audioCtx.onstatechange = function () {
      if (audioCtx.state === 'running' && playing && audio.paused) {
        audio.play().catch(function () {});
      }
    };
    try {
      source   = audioCtx.createMediaElementSource(audio);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 64;
      dataArr  = new Uint8Array(analyser.frequencyBinCount);
      gainNode = audioCtx.createGain();
      gainNode.gain.value = parseFloat(volSlider.value);
      source.connect(analyser);
      analyser.connect(gainNode);
      if (!muted) {
        gainNode.connect(audioCtx.destination);
        gainConnected = true;
      }
    } catch (e) {
      /* CORS or API error: route audio directly to output, skip visualizer */
      analyser = null;
      dataArr  = null;
      gainNode = null;
      if (source) {
        try { source.connect(audioCtx.destination); } catch (e2) {}
      }
    }
  }

  function drawViz() {
    vizRAF = requestAnimationFrame(drawViz);
    var w = vizW, h = vizH;

    if (analyser) analyser.getByteFrequencyData(dataArr);

    vctx.clearRect(0, 0, w, h);

    if (!analyser || !playing) {
      /* idle: two overlapping sine waves */
      var t = Date.now() / 1000;

      vctx.strokeStyle = 'rgba(0,255,65,0.18)';
      vctx.lineWidth = 1;
      vctx.beginPath();
      for (var x = 0; x < w; x++) {
        var y = h / 2 + Math.sin((x / w) * Math.PI * 12 + t * 1.3) * 3;
        x === 0 ? vctx.moveTo(x, y) : vctx.lineTo(x, y);
      }
      vctx.stroke();

      vctx.strokeStyle = 'rgba(0,255,65,0.28)';
      vctx.lineWidth = 1;
      vctx.beginPath();
      for (var x2 = 0; x2 < w; x2++) {
        var y2 = h / 2 + Math.sin((x2 / w) * Math.PI * 7 + t * 2.1) * 5;
        x2 === 0 ? vctx.moveTo(x2, y2) : vctx.lineTo(x2, y2);
      }
      vctx.stroke();
      return;
    }

    /* Float bar widths so bars tile the full canvas with no trailing gap */
    var barCount = dataArr.length;
    var barW = w / barCount;
    for (var i = 0; i < barCount; i++) {
      var barH = (dataArr[i] / 255) * h;
      if (barH < 1) continue;
      var alpha = 0.4 + (dataArr[i] / 255) * 0.6;
      var x = Math.round(i * barW);
      var bw = Math.max(1, Math.round((i + 1) * barW) - x - 1);
      /* Bar body */
      vctx.fillStyle = 'rgba(0,255,65,' + alpha + ')';
      vctx.fillRect(x, h - barH, bw, barH);
      /* Bright top cap */
      vctx.fillStyle = 'rgba(0,255,65,0.9)';
      vctx.fillRect(x, h - barH, bw, 2);
    }
  }

  function resizeViz() {
    var dpr = window.devicePixelRatio || 1;
    vizW = vizCanvas.offsetWidth;
    vizH = vizCanvas.offsetHeight;
    vizCanvas.width  = vizW * dpr;
    vizCanvas.height = vizH * dpr;
    vctx = vizCanvas.getContext('2d');
    vctx.scale(dpr, dpr);
  }

  resizeViz();
  window.addEventListener('resize', resizeViz);
  drawViz();

  /* ── Resume AudioContext when returning to the tab (desktop) ── */
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible' && audioCtx && playing) {
      audioCtx.resume().catch(function () {});
    }
  });

  /* ── Media Session (lock screen / background playback on mobile) ── */
  function updateMediaSession() {
    if (!('mediaSession' in navigator)) return;
    var track = playlist[currentTrackIndex];
    navigator.mediaSession.metadata = new MediaMetadata({
      title: track.title,
      artist: track.artist,
      album: 'Jungle.md'
    });
    navigator.mediaSession.setActionHandler('play', function () { playBtn.click(); });
    navigator.mediaSession.setActionHandler('pause', function () { playBtn.click(); });
    navigator.mediaSession.setActionHandler('stop', function () { stopBtn.click(); });
    navigator.mediaSession.setActionHandler('seekto', function (e) {
      if (audio.duration) audio.currentTime = e.seekTime;
    });
    navigator.mediaSession.setActionHandler('seekbackward', function (e) {
      audio.currentTime = Math.max(0, audio.currentTime - (e.seekOffset || 10));
    });
    navigator.mediaSession.setActionHandler('seekforward', function (e) {
      audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + (e.seekOffset || 10));
    });
    navigator.mediaSession.setActionHandler('previoustrack', function () { prevTrack(); });
    navigator.mediaSession.setActionHandler('nexttrack', function () { nextTrack(); });
  }

  /* ── Controls ── */
  playBtn.addEventListener('click', function () {
    if (!playing) {
      if (!audio.src) audio.src = playlist[currentTrackIndex].src;
      initAudioCtx();
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      audio.play().then(function () {
        playing = true;
        playBtn.innerHTML = '&#9646;&#9646; PAUSE';
        playBtn.classList.add('active');
        setStatus('STREAMING — ' + fmt(audio.currentTime) + ' / ' + fmt(audio.duration));
        updateMediaSession();
        if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
      }).catch(function (err) {
        setStatus('ERROR: ' + err.message);
      });
    } else {
      audio.pause();
      playing = false;
      playBtn.innerHTML = '&#9654; PLAY';
      playBtn.classList.remove('active');
      setStatus('PAUSED');
      if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
    }
  });

  stopBtn.addEventListener('click', function () {
    audio.pause();
    audio.currentTime = 0;
    playing = false;
    playBtn.innerHTML = '&#9654; PLAY';
    playBtn.classList.remove('active');
    seek.value = 0;
    updateSeekFill();
    elapsed.textContent = '00:00';
    setStatus('STOPPED — READY');
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'none';
  });

  audio.addEventListener('timeupdate', function () {
    if (!audio.duration) return;
    var pct = (audio.currentTime / audio.duration) * 100;
    seek.value = pct;
    updateSeekFill();
    elapsed.textContent = fmt(audio.currentTime);
    if (playing) {
      setStatus('STREAMING — ' + fmt(audio.currentTime) + ' / ' + fmt(audio.duration));
    }
  });

  audio.addEventListener('loadedmetadata', function () {
    duration.textContent = fmt(audio.duration);
    setStatus('FILE LOADED — READY');
  });

  audio.addEventListener('ended', function () {
    playing = false;
    playBtn.innerHTML = '&#9654; PLAY';
    playBtn.classList.remove('active');
    seek.value = 0;
    updateSeekFill();
    elapsed.textContent = '00:00';
    if (playlist.length > 1) {
      nextTrack();
    } else {
      setStatus('PLAYBACK COMPLETE');
    }
  });

  audio.addEventListener('error', function () {
    setStatus('ERROR: CANNOT LOAD — CHECK NETWORK OR FILE URL');
  });

  seek.addEventListener('input', function () {
    updateSeekFill();
    if (audio.duration) {
      audio.currentTime = (seek.value / 100) * audio.duration;
    }
  });

  document.getElementById('prevBtn').addEventListener('click', prevTrack);
  document.getElementById('nextBtn').addEventListener('click', nextTrack);

  document.addEventListener('keydown', function (e) {
    if (e.code === 'Space' && e.target === document.body) {
      e.preventDefault();
      playBtn.click();
    }
  });

  function setGain(val) {
    if (gainNode) { gainNode.gain.value = val; return; }
    try { audio.volume = val; } catch (e) {}
  }

  function handleVolChange() {
    var val = parseFloat(volSlider.value);
    updateVolFill();
    /* Moving slider > 0 while muted auto-unmutes */
    if (muted && val > 0) {
      muted = false;
      audio.muted = false;
      document.getElementById('volIcon').innerHTML = '[MUTE]';
      if (gainNode && !gainConnected) {
        gainNode.gain.value = val;
        try { gainNode.connect(audioCtx.destination); gainConnected = true; } catch (e) {}
      }
    }
    if (!muted) setGain(val);
  }

  /* iOS Safari fires 'change' on drag-end but not 'input' during drag */
  volSlider.addEventListener('input', handleVolChange);
  volSlider.addEventListener('change', handleVolChange);

  document.getElementById('volIcon').addEventListener('click', function () {
    muted = !muted;
    this.innerHTML = muted ? '[UNMUTE]' : '[MUTE]';
    audio.muted = muted;
    if (gainNode) {
      /* gainNode.gain.value = 0 is unreliable on iOS Safari; physically
         disconnecting the node from the destination is the only guaranteed
         way to silence the Web Audio graph on iOS. */
      if (muted && gainConnected) {
        try { gainNode.disconnect(); gainConnected = false; } catch (e) {}
      } else if (!muted && !gainConnected) {
        gainNode.gain.value = parseFloat(volSlider.value);
        try { gainNode.connect(audioCtx.destination); gainConnected = true; } catch (e) {}
      }
    }
    if (playing) {
      setStatus(muted ? 'MUTED — STILL STREAMING' : 'STREAMING — ' + fmt(audio.currentTime) + ' / ' + fmt(audio.duration));
    }
  });

  /* ── Init ── */
  setTrackNameUI(playlist[0]);
  renderPlaylist();
  updateVolFill();
})();
</script>
</body>
</html>
